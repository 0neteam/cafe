<body>
    <div class="container my-4">
        <div class="mb-4">
            <h2>카페 카테고리 관리</h2>

                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <ul class="list-group mb-3">
                        <li class="list-group-item border-0 d-flex justify-content-between align-items-center">
                            메뉴 1
                            <button class="btn btn-danger btn-sm">삭제</button>
                        </li>
                        <li class="list-group-item border-0 d-flex justify-content-between align-items-center ps-4">
                            메뉴 2
                            <button class="btn btn-danger btn-sm">삭제</button>
                        </li>
                        <li class="list-group-item border-0 d-flex justify-content-between align-items-center">
                            메뉴 3
                            <button class="btn btn-danger btn-sm">삭제</button>
                        </li>
                    </ul>                    
                    <button type="button" class="btn btn-primary">카테고리 추가</button>
                </div>
            </div>

            <!-- 우측 영역 -->
            <div class="col-12 col-md-8">
                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <div>
                        <div class="mb-3 row">
                            <label for="name" class="col-sm-3 col-form-label">메뉴명 :</label>
                            <div class="col-sm-9">
                                <input type="text" id="name" class="form-control" placeholder="메뉴명을 입력하세요">
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="description" class="col-sm-3 col-form-label">메뉴 설명 :</label>
                            <div class="col-sm-9">
                                <input id="description" class="form-control" placeholder="메뉴별 설명을 입력하세요">
                            </div>
                        </div>

                        <div class="mb-3 row align-items-center">
                            <label for="role" class="col-sm-3 col-form-label">권한 설정 :</label>
                            <div class="col-sm-9 d-flex align-items-center gap-2">
                                <select class="form-select">
                                    <option selected>전체</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label for="public" class="col-sm-3 col-form-label">공개 설정 :</label>
                            <div class="col-sm-9">
                                <input id="public" class="form-control" placeholder="공개 범위를 입력하세요">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="submit" class="btn btn-success">추가</button>
                        <button type="submit" class="btn btn-success">수정</button>
                        <button type="button" class="btn btn-secondary">취소</button>
