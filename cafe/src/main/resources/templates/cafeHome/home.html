
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default2}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페홈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/home.css" rel="stylesheet">

</head>
<main layout:fragment="content2" class="container my-2" style="min-height: 50vh;">
<body>
    <div class="container container-fluid">
        <div class="mt-5 mx-2">
            <div class="d-flex align-items-center gap-3">
                <form method="GET" action="/cafe/home/search" class="flex-fill" id="cafeSearch" name="cafeSearch">
                    <div class="input-group d-flex align-items-center">
                      <input name="keyward" type="text" class="form-control border-success" placeholder="검색어를 입력해주세요">
                      <button class="btn btn-success" type="submit">검색</button>
                    </div>
                </form>
                <div class="d-flex align-items-center ms-auto">
                    <a class="btn btn-success flex-fill" href="/cafe/home/create">카페만들기</a>
                </div>
            </div>
        </div>
        <div th:each="cafe : ${cafeList}" class="d-flex flex-column align-items-start mt-3">
            <ul class="container">
                <li class="card cafe-card container my-1">
                    <a th:href="@{'http://localhost:8001/'+${cafe.domain}}" class="text-dark">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${cafe.name}"></h5>
                            <p class="card-text mb-0 text-secondary" th:text="${cafe.description}"></p>
                            <p class="card-text mb-0 text-secondary" th:text="${#dates.format(cafe.regDate, 'yyyy-MM-dd')}">카페 개설일</p>
                        </div>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>
</main>


</html>
