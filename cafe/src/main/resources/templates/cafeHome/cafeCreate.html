<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default2}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 생성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        .card-body a {
            color: #000;
            text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<main layout:fragment="content2" class="container my-2" style="min-height: 50vh;">
<body>
    <div class="container my-2">
        <div class="d-flex justify-content-between align-items-center my-4">
            <h2 class="mb-0">카페 만들기</h2>
        </div>
        <form>
            <div class="mb-3 d-flex align-items-center">
                <label for="name" class="form-label me-3" style="width: 120px;">카페명</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="카페명을 입력하세요">
            </div>
            
            <div class="mb-3 d-flex align-items-center">
                <label for="domain" class="form-label me-3" style="width: 120px;">카페 도메인</label>
                <div class="d-flex align-items-center flex-grow-1">
                    <a>cafe.0neteam.co.kr/</a>
                    <input type="text" id="domain" name="domain" class="form-control ms-2">
                </div>
            </div>
            
            <div class="mb-4 d-flex align-items-center">
                <label for="description" class="form-label me-3" style="width: 120px;">카페 설명</label>
                <input id="description" name="description" class="form-control" placeholder="카페 설명을 입력하세요">
            </div>

            <div class="d-flex justify-content-center gap-2 my-2 d-flex">
                <button type="submit" class="btn btn-success flex-fill">생성</button>
                <button type="button" class="btn btn-secondary flex-fill" href="/">취소</button>
            </div>
        </form>
    </div>
    <script>

        $(document).ready(() => {

            $("form").on("submit", e => {
                e.preventDefault();
                $.ajax({
                    url: "/",
                    method: "PUT",
                    data: $(e.target).serialize()
                }).done(res => {
                    if(res === "success") {
                        document.location.href = "/" + $("#domain").val();
                    } else {
                        alert("님이 잘 못 함");
                    }
                }).fail(err => console.log(err));
            });

        });

    </script>
</body>
</main>
</html>
