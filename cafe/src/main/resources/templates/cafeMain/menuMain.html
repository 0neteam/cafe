<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        tr.clickable {
            cursor: pointer;
        }
        .card-body a {
        color: #000;
        text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<main layout:fragment="content" class="container my-2">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center my-4">
            <h5 class="mb-0" th:text="${menu.name}"></h5>
        </div>
        <div class="d-flex flex-column align-items-start mt-3">
            <div class="card cafe-card mb-3 w-100">
                <div class="card-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>글 제목</th>
                                <th class="text-end">작성자</th>
                                <th class="text-end">작성일</th>
                            </tr>
                        </thead>
                        <tbody th:if="${post != null}" th:each="post : ${postList}">
                            <tr>
                                <td>
                                    <a th:text="${post.title}" th:href="@{'/' + ${boardDTO.domain} + '/post/' + ${post.no}}"></a>
                                </td>
                                <td class="text-end" th:text="${post.user.name}"></td>
                                <td class="text-end" th:text="${post.regDate}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

</html>
