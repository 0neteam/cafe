<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/default3}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 관리-운영</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        .card-body a {
            color: #000;
            text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<main layout:fragment="content3" class="container my-2" style="min-height: 50vh;">
    <div class="container my-2">
        <div class="d-flex justify-content-between align-items-center my-4">
            <h2 class="mb-0">카페 운영</h2>
        </div>
        <form method="POST" th:action="@{/{domain}/setting/baseInfo(domain=${boardDTO.domain})}" id="baseInfo" name="baseInfo">
            <div class="mb-3 d-flex align-items-center">
                <label for="name" class="form-label me-3" style="width: 120px;">카페명</label>
                <input type="text" id="name" name="name" class="form-control" th:value="${boardDTO.name}">
            </div>
            
            <div class="mb-3 d-flex align-items-center">
                <label for="domain" class="form-label me-3" style="width: 120px;">카페 도메인</label>
                <div class="d-flex align-items-center flex-grow-1">
                    <a>cafe.0neteam.co.kr/</a>
                    <input type="text" id="domain" name="domain" class="form-control ms-2" th:value="${boardDTO.domain}">
                </div>
            </div>
            
            <div class="mb-4 d-flex align-items-center">
                <label for="description" class="form-label me-3" style="width: 120px;">카페 설명</label>
                <input id="description" name="description" class="form-control" th:value="${boardDTO.description}">
            </div>

            <div class="mb-4 d-flex align-items-center">
                <span style="width: 120px;">카페 인원 : </span>
                <span class="ms-3">35명</span>
            </div>

            <div class="mb-4 d-flex align-items-center">
                <span style="width: 120px;">게시글 수 : </span>
                <span class="ms-3">120개</span>
            </div>

            <div class="d-flex justify-content-center gap-2 my-2 d-flex">
                <button type="submit" class="btn btn-success flex-fill">수정</button>
                <a type="button" class="btn btn-secondary flex-fill" th:href="@{/{domain}/setting/baseInfo(domain=${boardDTO.domain})}">취소</a>
            </div>
            
        </form>
        <form method="POST" th:action="@{/{domain}/setting/delCafe(domain=${boardDTO.domain})}">
            <div class="d-flex justify-content-center gap-2 d-flex">
                <button type="submit" class="btn btn-danger flex-fill">카페 폐쇄</button>
            </div>
        </form>
    </div>
</main>
</html>
