<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 관리-운영</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        .card-body a {
            color: #000;
            text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container my-2">
        <div class="d-flex justify-content-between align-items-center my-4">
            <h2 class="mb-0">카페 운영</h2>
        </div>
        <form>
            <div class="mb-3 d-flex align-items-center">
                <label for="name" class="form-label me-3" style="width: 120px;">카페명</label>
                <input type="text" id="name" class="form-control" value="테스트용">
            </div>
            
            <div class="mb-3 d-flex align-items-center">
                <label for="domain" class="form-label me-3" style="width: 120px;">카페 도메인</label>
                <div class="d-flex align-items-center flex-grow-1">
                    <a>cafe.0neteam.co.kr/</a>
                    <input type="text" id="domain" class="form-control ms-2" value="asdf" readonly>
                </div>
            </div>
            
            <div class="mb-4 d-flex align-items-center">
                <label for="content" class="form-label me-3" style="width: 120px;">카페 설명</label>
                <input id="content" class="form-control" value="테스트를 위해 만든 카페입니다.">
            </div>

            <div class="mb-4 d-flex align-items-center">
                <span style="width: 120px;">카페 인원 : </span>
                <span class="ms-3">35명</span>
            </div>

            <div class="mb-4 d-flex align-items-center">
                <span style="width: 120px;">게시글 수 : </span>
                <span class="ms-3">120개</span>
            </div>

            <div class="d-flex justify-content-center gap-2 my-2 d-flex">
                <button type="submit" class="btn btn-success flex-fill">등록</button>
                <button type="button" class="btn btn-secondary flex-fill">취소</button>
            </div>
            
            <div class="d-flex justify-content-center gap-2 d-flex">
                <button type="button" class="btn btn-danger flex-fill">카페 폐쇄</button>
            </div>
        </form>
    </div>
</body>

</html>
