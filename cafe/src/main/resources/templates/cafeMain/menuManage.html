<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 관리-메뉴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .section-box {
            border: 1px solid #777;
            border-radius: 10px;
            padding: 20px;
            height: 100%;
        }
        .min-height-container {
            min-height: 50vh;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <div class="container my-4">
        <div class="mb-4">
            <h2>카페 메뉴 관리</h2>
        </div>

        <div class="row min-height-container gx-4">
            <!-- 좌측 메뉴 리스트 -->
            <div class="col-12 col-md-4 mb-4 mb-md-0">
                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <ul class="list-group mb-3" id="menuList">
                        <li th:each="menu : ${menuList}"
                            class="list-group-item border-0" 
                            th:data-menuNo="${menu.no}" 
                            th:data-menuName="${menu.name}">
                            <div class="w-100 d-flex justify-content-between align-items-center">
                                <span th:text="${menu.name}"></span>
                                <button type="button" class="btn btn-danger btn-sm delete-btn">삭제</button>
                            </div>
                            <div class="d-flex flex-column justify-content-between h-100">
                                <ul class="list-group mb-3">
                                    <li th:each="child : ${menu.children}"
                                        class="list-group-item border-0 d-flex justify-content-between align-items-center"
                                        th:data-menuNo="${child.no}" 
                                        th:data-menuName="${child.name}">
                                        <span th:text="${child.name}"></span>
                                        <button type="button" class="btn btn-danger btn-sm delete-btn">삭제</button>
                                    </li>
                                </ul>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 우측 메뉴 추가/수정 폼 -->
            <div class="col-12 col-md-8">
                <form id="menuForm" th:action="@{/menu/save}" method="post" class="section-box d-flex flex-column justify-content-between h-100">
                    <input type="hidden" id="menuId" name="no">
                    <div>
                        <div class="mb-3 row">
                            <label for="name" class="col-sm-3 col-form-label">메뉴명 :</label>
                            <div class="col-sm-9">
                                <input type="text" id="name" name="name" class="form-control" placeholder="메뉴명을 입력하세요" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" name="add" id="add" class="btn btn-success">추가</button>
                        <button type="button" name="edit" id="edit" class="btn btn-success" style="display:none;">수정</button>
                        <button type="button" class="btn btn-secondary" onclick="setToAddMode()">취소</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

<script>
    $(function() {
        // 부모 메뉴 클릭
        $('#menuList').on('click', '> li > div > span', function() {
            const menuItem = $(this).closest('li');
            const menuName = menuItem.data('menuname');
            const menuId = menuItem.data('menuno');
            setMenuName(menuName, menuId);
        });

        // 자식 메뉴 클릭
        $('#menuList').on('click', 'ul > li > span', function() {
            const menuItem = $(this).closest('li');
            const menuName = menuItem.data('menuname');
            const menuId = menuItem.data('menuno');
            setMenuName(menuName, menuId);
        });

        // 삭제 버튼 (부모/자식 메뉴 모두)
        $('#menuList').on('click', '.delete-btn', function(e) {
            e.stopPropagation();
            const menuItem = $(this).closest('li');
            const menuNo = menuItem.data('menuno');

            if (confirm("이 메뉴를 삭제하시겠습니까?")) {
                $.ajax({
                    url: '/menu/delete',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ no: menuNo }),
                    success: function(response) {
                        if (response === 'success') {
                            menuItem.remove();
                        } else {
                            alert('삭제 실패');
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('Error:', error);
                        alert('삭제 실패');
                    }
                });
            }
        });

        // 취소 버튼
        $('.btn-secondary').on('click', function() {
            setToAddMode();
        });
    });

    function setMenuName(menuName, menuId) {
        $('#name').val(menuName);
        $('#menuId').val(menuId);
        $('#add').hide();
        $('#edit').show();
    }

    function setToAddMode() {
        $('#name').val('');
        $('#menuId').val('');
        $('#add').show();
        $('#edit').hide();
    }
</script>



</html>
