<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페메인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

    <main layout:fragment="content" class="container-fluid" style="min-height: 100vh;">
        <a class="my-4" th:text="${boardDTO.name}" th:href="@{'/' + ${boardDTO.domain}}"></a>
        <div class="d-flex" style="margin-top: 10px;">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>글 제목</th>
                            <th class="text-end">작성자</th>
                            <th class="text-end">작성일</th>
                        </tr>
                    </thead>
                    <tbody th:if="${post != null}" th:each="post : ${postList}">
                        <tr>
                            <td>
                                <a th:text="${post.title}" th:href="@{'/' + ${boardDTO.domain} + '/post/' + ${post.no}}"></a>
                            </td>
                            <td class="text-end" th:text="${post.regUserNo}"></td>
                            <td class="text-end" th:text="${post.regDate}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</html>
