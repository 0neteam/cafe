<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페메인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        .card-body a {
            color: #000;
            text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main class="container my-2" layout:fragment="content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center my-4">
                <h2 class="mb-0">카페 A 홈</h2>
                <p th:text="${boardDTO}"></p>

            </div>

            <div class="d-flex flex-column align-items-start mt-3" id="content-container">
                <div class="card cafe-card mb-3 w-100">
                    <div class="card-body">
                        <a href="#" class="card-title">카페 A</a><hr>
                        <table class="table">
                            <tbody>
                                <tr><td>게시글 제목 1</td></tr>
                                <tr><td>게시글 제목 2</td></tr>
                                <tr><td>게시글 제목 3</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card cafe-card mb-3 w-100">
                    <div class="card-body">
                        <a href="#" class="card-title">카페 B</a><hr>
                        <table class="table">
                            <tbody>
                                <tr><td>게시글 제목 1</td></tr>
                                <tr><td>게시글 제목 2</td></tr>
                                <tr><td>게시글 제목 3</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
