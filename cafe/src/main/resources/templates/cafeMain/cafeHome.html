<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페홈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        .card-body a {
            color: #000;
            text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main layout:fragment="content" class="container my-2" style="min-height: 50vh;">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center my-4">
                <h2 class="mb-0">카페 A 홈</h2>
            </div>

            <div class="d-flex flex-column align-items-start mt-3" id="content-container">
                <div th:each="menu : ${menuList}" class="card cafe-card mb-3 w-100">
                    <div class="card-body">
                        <a href="#" th:text="${menu.name}" class="card-title">카페 이름</a><hr>
                        <table class="table">
                            <tbody>
                                <tr><td th:text="'게시글 제목 ' + ${menu.no}">게시글 제목</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
