<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default2}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 폼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body th:attr="data-domain=${domain}">
    <main layout:fragment="content2">
        <div class="container my-2">
            <div class="d-flex justify-content-between align-items-center my-4">
                <h2 class="mb-0">글쓰기</h2>
            </div>
            <!-- <form th:action="@{|/write/save|}" method="post" th:object="${postDTO}"> -->
            <form th:action="@{|/write/save|}" method="post">
                <div class="mb-3">
                    <div class="mb-3">
                        <select class="form-select mt-2 ps-3">
                            <option value="" disabled selected>메뉴 선택</option>
                            <option th:each="menu : ${menuList}"
                                    th:if="${menu.depth > 0}"
                                    th:value="${menu.no}"
                                    th:data-menuNo="${menu.no}"
                                    th:data-menuName="${menu.name}"
                                    th:data-menuRef="${menu.ref}"
                                    th:text="${menu.name}">
                            </option>
                        </select>                        
                    </div>
                    
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label">글 제목</label>
                    <!-- <input type="text" id="title" class="form-control" th:field="*{title}" placeholder="제목을 입력하세요"> -->
                    <input type="text" id="title" class="form-control" placeholder="제목을 입력하세요">
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">내용물 (에디터 사용)</label>
                    <!-- <textarea id="content" class="form-control" rows="16" th:field="*{content}" placeholder="에디터"></textarea> -->
                    <textarea id="content" class="form-control" rows="16" placeholder="에디터"></textarea>
                </div>

                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-success">등록</button>
                    <button type="submit" class="btn btn-success">수정</button>
                    <button type="button" class="btn btn-secondary">취소</button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
