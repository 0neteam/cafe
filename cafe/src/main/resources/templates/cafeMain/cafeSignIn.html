<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페홈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table td, .table th {
            vertical-align: middle;
        }
        .card-body a {
            color: #000;
            text-decoration: none;
        }
        .card-body a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container my-2">
        <div class="d-flex justify-content-between align-items-center my-4">
            <h2 class="mb-0">카페 가입</h2>
        </div>
        <form>
            <div class="mb-3">
                <a>이 카페에서 활동하는 동안 원활한 카페 운영을 위하여 (필수) 아이디, 별명, 활동내역, (선택) 성별, 연령대, 이름(단, 이름은 실명 공개 카페에 한해 공개)이 이 카페의 운영진에게 공개되며, 최소한의 제재 기록은 카페 탈퇴 후에도 보관됩니다. 본 동의를 거부하실 수 있으나, 카페 가입이 불가능합니다.</a>
            </div>
            <div class="d-flex justify-content-center gap-2">
                <button type="submit" class="btn btn-success">동의하고 가입하기</button>
                <button type="button" class="btn btn-secondary">취소</button>
            </div>
        </form>
    </div>
</body>

</html>
