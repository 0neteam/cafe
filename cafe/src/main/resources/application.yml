spring:
  profiles:
    group:
      dev:
        - dev

spring:
# ENV 설정
  config:
    activate:
      on-profile: prod
  
spring:
  application:
    name: cafe
  config:
# database 설정
  datasource:
    driver-class-name: ${DB_DRIVER}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # file size 설정
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  
  # 복호화 키
  access:
  keys:
    private: ${PRIVATE_KEY}
    
  # 개발중 사용
server:
  port: 8001


# log level 설정
logging:
  level:
    org:
      springframework:
        web: INFO
        security: trace
        hibernate.sql: debug
      thymeleaf: INFO

jpa:
  hibernate.ddl-auto: none
  properties.hibernate:
    show_sql: true
    format_sql: true
  hibernate:
    naming:
      implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
      physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

rsa:
  public-key: classpath:keys/public.pem
  private-key: classpath:keys/private.pem
